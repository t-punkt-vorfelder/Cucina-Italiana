<!DOCTYPE html>

<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Meine Küche" />
  <meta name="theme-color" content="#5a7a3a" />
  <title>Mediterrane Küche 🫒</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f0ede8; display: flex; justify-content: center; min-height: 100vh; }
    #root { width: 100%; max-width: 430px; background: #fafaf8; min-height: 100vh; }
    .recipe-card { cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; }
    .recipe-card:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,0,0,0.10); }
    .btn-primary { cursor: pointer; transition: opacity 0.15s, transform 0.15s; }
    .btn-primary:hover { opacity: 0.88; transform: scale(0.98); }
    .back-btn { cursor: pointer; }
    .back-btn:hover { opacity: 0.7; }
    input, textarea, select { outline: none; }
    input:focus, textarea:focus, select:focus { border-color: #5a7a3a !important; }
    .fade-in { animation: fadeIn 0.35s ease; }
    @keyframes fadeIn { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: translateY(0); } }
    /* iOS safe areas */
    .safe-bottom { padding-bottom: max(32px, env(safe-area-inset-bottom)); }
    .safe-top { padding-top: max(24px, env(safe-area-inset-top)); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const INITIAL_RECIPES = [
      {
        id: 1,
        title: "Warmer Tomaten-Kichererbsen-Salat",
        subtitle: "mit Mozzarella",
        emoji: "🥗",
        time: "15 Min",
        portions: "2",
        difficulty: "Einfach",
        meal: "Abendessen",
        diet: "Vegetarisch",
        description: "Ein herzhaftes, unkompliziertes Abendessen das die besten Aromen des Mittelmeers vereint. Saftige Tomaten, cremiger Mozzarella und knackige Kichererbsen mit einem großzügigen Schuss bestem Olivenöl.",
        ingredients: [
          { group: "Für den Salat", items: ["1 Dose Kichererbsen (400 g), abgetropft", "300 g Cherrytomaten, halbiert", "1 Zucchini, in dünne Scheiben", "125 g frischer Mozzarella, gezupft", "1 Handvoll frisches Basilikum", "2 Knoblauchzehen, fein gehackt"] },
          { group: "Für das Dressing", items: ["4–5 EL Olivenöl extra vergine", "1 EL Zitronensaft", "1 TL getrockneter Oregano", "Salz & schwarzer Pfeffer", "Optional: 1 Prise Chiliflocken"] },
        ],
        steps: [
          { title: "Kichererbsen anrösten", desc: "Eine Pfanne bei mittlerer bis hoher Hitze erhitzen. 2 EL Olivenöl hineingeben, Kichererbsen und Knoblauch dazugeben und ca. 5 Minuten knusprig anbraten. Mit Salz, Pfeffer und Oregano würzen." },
          { title: "Zucchini grillen", desc: "Zucchinischeiben in die gleiche Pfanne geben und 2–3 Minuten pro Seite braten, bis sie goldbraun sind. Beiseitestellen." },
          { title: "Dressing anrühren", desc: "Restliches Olivenöl, Zitronensaft, Salz, Pfeffer und ggf. Chiliflocken in einer kleinen Schüssel verrühren." },
          { title: "Alles kombinieren", desc: "Kichererbsen, Zucchini und Cherrytomaten auf zwei Tellern anrichten. Mozzarella darüber zupfen, Basilikumblätter verteilen." },
          { title: "Dressing drübergießen", desc: "Das Olivenöl-Dressing großzügig darübergießen – und sofort genießen!" },
        ],
        nutrition: { kcal: "480", ballaststoffe: "9g", fett: "28g", eiweiss: "22g", kohlenhydrate: "32g" },
        tip: "Variation: Füge schwarze Oliven oder sonnengetrocknete Tomaten hinzu. Aufbewahrung: Ohne Mozzarella und Dressing bis zu 2 Tage im Kühlschrank.",
        color: "#e8f0d8", accent: "#5a7a3a",
      },
      {
        id: 2,
        title: "Mediterranes Ofengemüse mit Lachsfilet",
        subtitle: "& Vollkornnudeln",
        emoji: "🐟",
        time: "40 Min",
        portions: "4",
        difficulty: "Mittel",
        meal: "Abendessen",
        diet: "Für die ganze Familie",
        description: "Buntes, kinderfreundliches Gericht mit zartem Lachsfilet auf aromatischem Ofengemüse und Vollkornnudeln – gesund, farbenfroh und in unter 45 Minuten fertig.",
        ingredients: [
          { group: "Für Gemüse & Lachs", items: ["4 Lachsfilets (à ca. 150 g)", "2 Paprika (rot & gelb), in Streifen", "2 Zucchini, in Halbmonde", "250 g Cherrytomaten, ganz", "1 rote Zwiebel, in Spalten", "5 EL Olivenöl extra vergine", "3 Knoblauchzehen, fein gehackt", "Saft ½ Zitrone", "1 TL Oregano, 1 TL Thymian", "Salz & Pfeffer"] },
          { group: "Für die Nudeln", items: ["320 g Vollkornnudeln (z. B. Penne)", "1 EL Olivenöl extra vergine", "Frisches Basilikum", "Parmesan (optional)"] },
        ],
        steps: [
          { title: "Ofen vorheizen", desc: "Backofen auf 200 °C Ober-/Unterhitze vorheizen. Ein großes Backblech mit Backpapier auslegen." },
          { title: "Gemüse marinieren", desc: "Paprika, Zucchini, Cherrytomaten und Zwiebel auf dem Blech verteilen. Mit 3 EL Olivenöl, Knoblauch, Oregano, Thymian, Salz und Pfeffer vermengen. 20 Minuten im Ofen rösten." },
          { title: "Lachs vorbereiten", desc: "Lachsfilets mit 2 EL Olivenöl, Zitronensaft, Salz und Pfeffer einreiben." },
          { title: "Lachs dazulegen", desc: "Nach 20 Minuten die Lachsfilets auf das Gemüse legen und weitere 12–15 Minuten backen, bis der Lachs gar ist." },
          { title: "Nudeln kochen", desc: "Vollkornnudeln nach Packungsanleitung al dente kochen, abgießen und mit 1 EL Olivenöl schwenken." },
          { title: "Anrichten", desc: "Nudeln auf Teller verteilen, Ofengemüse und Lachs darauflegen, mit frischem Basilikum garnieren und Parmesan darüberreiben." },
        ],
        nutrition: { kcal: "550", ballaststoffe: "8g", fett: "22g", eiweiss: "38g", kohlenhydrate: "45g" },
        tip: "Kindertipp: Lachs vor dem Servieren auf Gräten prüfen. Variation: Statt Lachs auch Hähnchenbrust (5 Min länger backen).",
        color: "#fde8d8", accent: "#c05a2a",
      },
      {
        id: 3,
        title: "Mediterrane Ofenpizza",
        subtitle: "auf Fladenbrot",
        emoji: "🍕",
        time: "35 Min",
        portions: "4",
        difficulty: "Einfach",
        meal: "Abendessen",
        diet: "Vegetarisch · Kinder ♥",
        description: "Knusprige Fladenbrot-Pizza mit buntem Gemüse, Mozzarella und Olivenöl – schnell gemacht, herrlich aromatisch und richtig nahrhaft.",
        ingredients: [
          { group: "Für den Belag", items: ["4 runde Fladenbrote (Pide oder Naan)", "2 Paprika (rot & gelb), in Streifen", "1 Zucchini, in dünne Scheiben", "200 g Cherrytomaten, halbiert", "1 rote Zwiebel, in dünne Ringe", "250 g Mozzarella, in Scheiben", "50 g schwarze Oliven (optional)", "1 Handvoll frisches Basilikum"] },
          { group: "Für die Tomatensauce", items: ["1 Dose gehackte Tomaten (400 g)", "2 Knoblauchzehen, fein gehackt", "1 TL Oregano", "1 TL Zucker", "Salz & Pfeffer", "5 EL Olivenöl extra vergine"] },
        ],
        steps: [
          { title: "Ofen vorheizen", desc: "Backofen auf 220 °C Ober-/Unterhitze vorheizen." },
          { title: "Sauce kochen", desc: "2 EL Olivenöl erhitzen, Knoblauch andünsten. Gehackte Tomaten, Oregano, Zucker, Salz und Pfeffer dazugeben und 8 Minuten einkochen lassen." },
          { title: "Gemüse vorbereiten", desc: "Paprika, Zucchini und Zwiebel mit 2 EL Olivenöl, Salz und Pfeffer vermengen." },
          { title: "Fladenbrote belegen", desc: "Tomatensauce auf die Fladenbrote streichen, Gemüse und Cherrytomaten verteilen, Mozzarella darauflegen." },
          { title: "Backen", desc: "12–15 Minuten auf einem Backblech backen, bis der Käse goldbraun blubbert." },
          { title: "Fertigstellen", desc: "Aus dem Ofen nehmen, mit 1 EL Olivenöl beträufeln, Basilikum darüberstreuen. Sofort servieren!" },
        ],
        nutrition: { kcal: "520", ballaststoffe: "6g", fett: "24g", eiweiss: "20g", kohlenhydrate: "52g" },
        tip: "Kindertipp: Kinder den Belag selbst auflegen lassen – das macht Spaß! Variation: Mit Feta statt Mozzarella. Reste im Ofen aufknuspern.",
        color: "#fdf3d8", accent: "#b07a10",
      },
    ];

    const ADD_FORM_EMPTY = {
      title: "", subtitle: "", emoji: "🍽", time: "", portions: "2",
      difficulty: "Einfach", meal: "Abendessen", diet: "",
      description: "", ingredientsRaw: "", stepsRaw: "", tip: "",
      color: "#e8f0d8", accent: "#5a7a3a",
    };

    const inputStyle = {
      width: "100%", padding: "11px 14px",
      border: "1px solid #ddd", borderRadius: 10,
      fontFamily: "'DM Sans', sans-serif", fontSize: 14, color: "#333",
      background: "#fff", transition: "border-color 0.2s",
    };

    function Section({ title, children }) {
      return (
        <div style={{ padding: "20px 20px 0" }}>
          <div style={{ fontFamily: "'Playfair Display', Georgia, serif", fontSize: 17, fontWeight: 700, color: "#1a1a1a", marginBottom: 14, borderBottom: "1px solid #ececea", paddingBottom: 8 }}>{title}</div>
          {children}
        </div>
      );
    }

    function Field({ label, children, style }) {
      return (
        <div style={style}>
          <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 11, letterSpacing: 1.5, textTransform: "uppercase", color: "#999", marginBottom: 6 }}>{label}</div>
          {children}
        </div>
      );
    }

    function App() {
      const [recipes, setRecipes] = useState(INITIAL_RECIPES);
      const [view, setView] = useState("home");
      const [selected, setSelected] = useState(null);
      const [cookStep, setCookStep] = useState(0);
      const [addForm, setAddForm] = useState(ADD_FORM_EMPTY);
      const [saved, setSaved] = useState(false);

      useEffect(() => {
        try {
          const stored = localStorage.getItem("mediterran_recipes_v1");
          if (stored) {
            const parsed = JSON.parse(stored);
            if (parsed.length > 0) setRecipes(parsed);
          }
        } catch {}
      }, []);

      const saveRecipes = (updated) => {
        try { localStorage.setItem("mediterran_recipes_v1", JSON.stringify(updated)); } catch {}
        setRecipes(updated);
      };

      const openRecipe = (r) => { setSelected(r); setView("detail"); window.scrollTo(0, 0); };
      const startCooking = (r) => { setSelected(r); setCookStep(0); setView("cook"); window.scrollTo(0, 0); };

      const handleAdd = () => {
        if (!addForm.title.trim()) return;
        const newRecipe = {
          id: Date.now(),
          title: addForm.title.trim(),
          subtitle: addForm.subtitle.trim(),
          emoji: addForm.emoji || "🍽",
          time: addForm.time,
          portions: addForm.portions,
          difficulty: addForm.difficulty,
          meal: addForm.meal,
          diet: addForm.diet,
          description: addForm.description,
          ingredients: addForm.ingredientsRaw ? [{ group: "Zutaten", items: addForm.ingredientsRaw.split("\n").filter(Boolean) }] : [],
          steps: addForm.stepsRaw ? addForm.stepsRaw.split("\n").filter(Boolean).map((s, i) => ({ title: `Schritt ${i + 1}`, desc: s })) : [],
          nutrition: { kcal: "–", ballaststoffe: "–", fett: "–", eiweiss: "–", kohlenhydrate: "–" },
          tip: addForm.tip,
          color: addForm.color,
          accent: addForm.accent,
        };
        const updated = [...recipes, newRecipe];
        saveRecipes(updated);
        setSaved(true);
        setTimeout(() => { setSaved(false); setView("home"); setAddForm(ADD_FORM_EMPTY); window.scrollTo(0, 0); }, 1200);
      };

      const deleteRecipe = (id) => { saveRecipes(recipes.filter(r => r.id !== id)); setView("home"); };

      return (
        <div style={{ fontFamily: "'Georgia', 'Times New Roman', serif", background: "#fafaf8", minHeight: "100vh" }}>

          {/* ── HOME ── */}
          {view === "home" && (
            <div className="fade-in">
              <div style={{ background: "#fff", borderBottom: "1px solid #ececea", padding: "48px 24px 20px" }} className="safe-top">
                <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 11, letterSpacing: 3, color: "#999", textTransform: "uppercase", marginBottom: 6 }}>Mediterrane Küche</div>
                <div style={{ fontFamily: "'Playfair Display', Georgia, serif", fontSize: 32, fontWeight: 900, color: "#1a1a1a", lineHeight: 1.1 }}>Meine<br />Rezepte 🫒</div>
                <div style={{ marginTop: 8, fontFamily: "'DM Sans', sans-serif", fontSize: 13, color: "#888" }}>{recipes.length} Rezepte · Olivenöl · Gemüse · Familie</div>
              </div>
              <div style={{ padding: "20px 16px", display: "flex", flexDirection: "column", gap: 14 }}>
                {recipes.map((r) => (
                  <div key={r.id} className="recipe-card" onClick={() => openRecipe(r)} style={{ background: "#fff", borderRadius: 16, overflow: "hidden", border: "1px solid #ececea", boxShadow: "0 2px 12px rgba(0,0,0,0.04)" }}>
                    <div style={{ background: r.color, padding: "22px 22px 18px", borderBottom: `3px solid ${r.accent}` }}>
                      <div style={{ fontSize: 36, marginBottom: 8 }}>{r.emoji}</div>
                      <div style={{ fontFamily: "'Playfair Display', Georgia, serif", fontSize: 20, fontWeight: 700, color: "#1a1a1a", lineHeight: 1.2 }}>{r.title}</div>
                      {r.subtitle && <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 13, color: r.accent, marginTop: 3, fontWeight: 500 }}>{r.subtitle}</div>}
                    </div>
                    <div style={{ padding: "14px 22px", display: "flex", gap: 16 }}>
                      {[["⏱", r.time], ["👥", r.portions + " P."], ["✅", r.difficulty]].map(([icon, val]) => (
                        <div key={val} style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 12, color: "#666", display: "flex", alignItems: "center", gap: 4 }}>
                          <span>{icon}</span><span>{val}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                ))}
              </div>
              <div style={{ padding: "0 16px 48px" }} className="safe-bottom">
                <button className="btn-primary" onClick={() => { setView("add"); window.scrollTo(0,0); }} style={{ width: "100%", padding: "16px", background: "#1a1a1a", color: "#fff", border: "none", borderRadius: 12, fontFamily: "'DM Sans', sans-serif", fontSize: 15, fontWeight: 500 }}>+ Neues Rezept hinzufügen</button>
              </div>
            </div>
          )}

          {/* ── DETAIL ── */}
          {view === "detail" && selected && (
            <div className="fade-in">
              <div style={{ background: selected.color, padding: "48px 24px 20px", borderBottom: `4px solid ${selected.accent}` }} className="safe-top">
                <button className="back-btn" onClick={() => setView("home")} style={{ background: "rgba(0,0,0,0.07)", border: "none", borderRadius: 8, padding: "7px 14px", fontFamily: "'DM Sans', sans-serif", fontSize: 13, color: "#444", marginBottom: 18 }}>← Zurück</button>
                <div style={{ fontSize: 48, marginBottom: 10 }}>{selected.emoji}</div>
                <div style={{ fontFamily: "'Playfair Display', Georgia, serif", fontSize: 26, fontWeight: 900, color: "#1a1a1a", lineHeight: 1.15 }}>{selected.title}</div>
                {selected.subtitle && <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 14, color: selected.accent, marginTop: 4, fontWeight: 500 }}>{selected.subtitle}</div>}
                <div style={{ marginTop: 12, fontFamily: "'DM Sans', sans-serif", fontSize: 13, color: "#555", lineHeight: 1.6 }}>{selected.description}</div>
                <div style={{ marginTop: 14, display: "flex", flexWrap: "wrap", gap: 8 }}>
                  {[["⏱", selected.time], ["👥", selected.portions + " Port."], ["✅", selected.difficulty], ["🍽", selected.meal]].map(([ic, v]) => (
                    <span key={v} style={{ background: "rgba(255,255,255,0.6)", borderRadius: 20, padding: "4px 12px", fontFamily: "'DM Sans', sans-serif", fontSize: 12, color: "#444" }}>{ic} {v}</span>
                  ))}
                </div>
              </div>

              <div style={{ paddingBottom: 40 }}>
                <Section title="🛒 Zutaten">
                  {selected.ingredients.map((g, gi) => (
                    <div key={gi} style={{ marginBottom: 14 }}>
                      <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 11, letterSpacing: 2, textTransform: "uppercase", color: "#999", marginBottom: 8 }}>{g.group}</div>
                      {g.items.map((item, ii) => (
                        <div key={ii} style={{ display: "flex", alignItems: "flex-start", gap: 10, padding: "7px 0", borderBottom: "1px solid #f0f0ee" }}>
                          <div style={{ width: 6, height: 6, borderRadius: "50%", background: selected.accent, marginTop: 6, flexShrink: 0 }} />
                          <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 14, color: "#333", lineHeight: 1.4 }}>{item}</div>
                        </div>
                      ))}
                    </div>
                  ))}
                </Section>

                <Section title="🥗 Nährwerte pro Portion">
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                    {[["Kalorien", selected.nutrition.kcal + " kcal"], ["Ballaststoffe", selected.nutrition.ballaststoffe], ["Fett", selected.nutrition.fett], ["Eiweiß", selected.nutrition.eiweiss], ["Kohlenhydrate", selected.nutrition.kohlenhydrate]].map(([k, v]) => (
                      <div key={k} style={{ background: selected.color, borderRadius: 10, padding: "12px 14px" }}>
                        <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 11, color: "#888", marginBottom: 2 }}>{k}</div>
                        <div style={{ fontFamily: "'Playfair Display', serif", fontSize: 18, fontWeight: 700, color: selected.accent }}>{v}</div>
                      </div>
                    ))}
                  </div>
                </Section>

                {selected.tip && (
                  <Section title="💡 Tipp">
                    <div style={{ background: "#fffdf5", border: "1px solid #e8e0c0", borderRadius: 10, padding: "14px 16px", fontFamily: "'DM Sans', sans-serif", fontSize: 13, color: "#555", lineHeight: 1.7 }}>{selected.tip}</div>
                  </Section>
                )}

                <div style={{ padding: "20px 20px 0", display: "flex", gap: 10 }}>
                  <button className="btn-primary" onClick={() => startCooking(selected)} style={{ flex: 1, padding: "15px", background: "#1a1a1a", color: "#fff", border: "none", borderRadius: 12, fontFamily: "'DM Sans', sans-serif", fontSize: 15, fontWeight: 500 }}>Jetzt kochen 👨‍🍳</button>
                  {selected.id > 3 && (
                    <button className="btn-primary" onClick={() => deleteRecipe(selected.id)} style={{ padding: "15px 18px", background: "#fff", color: "#cc3333", border: "1px solid #e0d0d0", borderRadius: 12, fontSize: 15 }}>🗑</button>
                  )}
                </div>
              </div>
            </div>
          )}

          {/* ── COOK MODE ── */}
          {view === "cook" && selected && (
            <div className="fade-in" style={{ minHeight: "100vh", display: "flex", flexDirection: "column" }}>
              <div style={{ background: selected.accent, padding: "48px 20px 18px", color: "#fff" }} className="safe-top">
                <button className="back-btn" onClick={() => setView("detail")} style={{ background: "rgba(255,255,255,0.2)", border: "none", borderRadius: 8, padding: "6px 14px", fontFamily: "'DM Sans', sans-serif", fontSize: 13, color: "#fff", marginBottom: 14 }}>← Rezept</button>
                <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 11, letterSpacing: 2, textTransform: "uppercase", opacity: 0.8, marginBottom: 4 }}>Koch-Modus</div>
                <div style={{ fontFamily: "'Playfair Display', serif", fontSize: 20, fontWeight: 700 }}>{selected.title}</div>
                <div style={{ display: "flex", gap: 6, marginTop: 14 }}>
                  {selected.steps.map((_, i) => (
                    <div key={i} onClick={() => setCookStep(i)} style={{ height: 4, borderRadius: 2, cursor: "pointer", flex: i <= cookStep ? 2 : 1, background: i <= cookStep ? "#fff" : "rgba(255,255,255,0.3)", transition: "all 0.3s" }} />
                  ))}
                </div>
                <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 12, opacity: 0.8, marginTop: 8 }}>Schritt {cookStep + 1} von {selected.steps.length}</div>
              </div>

              <div style={{ flex: 1, padding: "30px 24px 20px" }} key={cookStep}>
                <div className="fade-in">
                  <div style={{ width: 48, height: 48, borderRadius: "50%", background: selected.color, border: `2px solid ${selected.accent}`, display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "'Playfair Display', serif", fontSize: 20, fontWeight: 900, color: selected.accent, marginBottom: 20 }}>{cookStep + 1}</div>
                  <div style={{ fontFamily: "'Playfair Display', serif", fontSize: 24, fontWeight: 700, color: "#1a1a1a", marginBottom: 16, lineHeight: 1.2 }}>{selected.steps[cookStep].title}</div>
                  <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 16, color: "#444", lineHeight: 1.8 }}>{selected.steps[cookStep].desc}</div>
                </div>
              </div>

              <div style={{ padding: "20px 24px" }} className="safe-bottom">
                <div style={{ display: "flex", gap: 12 }}>
                  <button className="btn-primary" onClick={() => setCookStep(s => Math.max(0, s - 1))} disabled={cookStep === 0}
                    style={{ flex: 1, padding: "15px", background: "#fff", border: "1px solid #ddd", borderRadius: 12, fontFamily: "'DM Sans', sans-serif", fontSize: 15, color: "#333", opacity: cookStep === 0 ? 0.3 : 1 }}>← Zurück</button>
                  {cookStep < selected.steps.length - 1
                    ? <button className="btn-primary" onClick={() => setCookStep(s => s + 1)} style={{ flex: 2, padding: "15px", background: selected.accent, color: "#fff", border: "none", borderRadius: 12, fontFamily: "'DM Sans', sans-serif", fontSize: 15, fontWeight: 500 }}>Weiter →</button>
                    : <button className="btn-primary" onClick={() => { setView("home"); window.scrollTo(0,0); }} style={{ flex: 2, padding: "15px", background: "#1a1a1a", color: "#fff", border: "none", borderRadius: 12, fontFamily: "'DM Sans', sans-serif", fontSize: 15, fontWeight: 500 }}>🎉 Fertig! Guten Appetit</button>
                  }
                </div>
              </div>
            </div>
          )}

          {/* ── ADD RECIPE ── */}
          {view === "add" && (
            <div className="fade-in">
              <div style={{ background: "#fff", borderBottom: "1px solid #ececea", padding: "48px 24px 20px" }} className="safe-top">
                <button className="back-btn" onClick={() => setView("home")} style={{ background: "#f0f0ee", border: "none", borderRadius: 8, padding: "7px 14px", fontFamily: "'DM Sans', sans-serif", fontSize: 13, color: "#444", marginBottom: 16 }}>← Zurück</button>
                <div style={{ fontFamily: "'Playfair Display', Georgia, serif", fontSize: 28, fontWeight: 900, color: "#1a1a1a" }}>Neues Rezept ✏️</div>
              </div>

              <div style={{ padding: "20px 20px 80px", display: "flex", flexDirection: "column", gap: 18 }}>
                <Field label="Rezeptname *"><input value={addForm.title} onChange={e => setAddForm(f => ({ ...f, title: e.target.value }))} placeholder="z. B. Griechischer Salat" style={inputStyle} /></Field>
                <Field label="Untertitel"><input value={addForm.subtitle} onChange={e => setAddForm(f => ({ ...f, subtitle: e.target.value }))} placeholder="z. B. mit Feta & Oliven" style={inputStyle} /></Field>
                <div style={{ display: "flex", gap: 12 }}>
                  <Field label="Emoji" style={{ flex: 1 }}><input value={addForm.emoji} onChange={e => setAddForm(f => ({ ...f, emoji: e.target.value }))} style={{ ...inputStyle, textAlign: "center", fontSize: 24 }} /></Field>
                  <Field label="Zeit" style={{ flex: 2 }}><input value={addForm.time} onChange={e => setAddForm(f => ({ ...f, time: e.target.value }))} placeholder="30 Min" style={inputStyle} /></Field>
                  <Field label="Port." style={{ flex: 1 }}><input value={addForm.portions} onChange={e => setAddForm(f => ({ ...f, portions: e.target.value }))} style={inputStyle} /></Field>
                </div>
                <div style={{ display: "flex", gap: 12 }}>
                  <Field label="Schwierigkeit" style={{ flex: 1 }}>
                    <select value={addForm.difficulty} onChange={e => setAddForm(f => ({ ...f, difficulty: e.target.value }))} style={inputStyle}>
                      {["Einfach", "Mittel", "Anspruchsvoll"].map(o => <option key={o}>{o}</option>)}
                    </select>
                  </Field>
                  <Field label="Mahlzeit" style={{ flex: 1 }}>
                    <select value={addForm.meal} onChange={e => setAddForm(f => ({ ...f, meal: e.target.value }))} style={inputStyle}>
                      {["Frühstück", "Mittagessen", "Abendessen", "Snack"].map(o => <option key={o}>{o}</option>)}
                    </select>
                  </Field>
                </div>
                <Field label="Beschreibung"><textarea value={addForm.description} onChange={e => setAddForm(f => ({ ...f, description: e.target.value }))} placeholder="Kurze Beschreibung..." rows={3} style={{ ...inputStyle, resize: "vertical" }} /></Field>
                <Field label="Zutaten (eine pro Zeile)"><textarea value={addForm.ingredientsRaw} onChange={e => setAddForm(f => ({ ...f, ingredientsRaw: e.target.value }))} placeholder={"200 g Tomaten\n3 EL Olivenöl\n..."} rows={5} style={{ ...inputStyle, resize: "vertical", fontFamily: "'DM Sans', sans-serif" }} /></Field>
                <Field label="Zubereitungsschritte (ein Schritt pro Zeile)"><textarea value={addForm.stepsRaw} onChange={e => setAddForm(f => ({ ...f, stepsRaw: e.target.value }))} placeholder={"Ofen auf 200°C vorheizen.\nGemüse schneiden...\n..."} rows={5} style={{ ...inputStyle, resize: "vertical", fontFamily: "'DM Sans', sans-serif" }} /></Field>
                <Field label="Tipp (optional)"><textarea value={addForm.tip} onChange={e => setAddForm(f => ({ ...f, tip: e.target.value }))} placeholder="Variation, Aufbewahrung..." rows={2} style={{ ...inputStyle, resize: "vertical" }} /></Field>
                <Field label="Kartenfarbe">
                  <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
                    {[["#e8f0d8","#5a7a3a"],["#fde8d8","#c05a2a"],["#fdf3d8","#b07a10"],["#d8eaf0","#2a6a8a"],["#f0d8f0","#8a3a8a"]].map(([bg, ac]) => (
                      <div key={bg} onClick={() => setAddForm(f => ({ ...f, color: bg, accent: ac }))} style={{ width: 36, height: 36, borderRadius: 8, background: bg, border: addForm.color === bg ? `3px solid ${ac}` : "2px solid #ddd", cursor: "pointer" }} />
                    ))}
                  </div>
                </Field>
                <button className="btn-primary" onClick={handleAdd} style={{ padding: "16px", background: saved ? "#5a7a3a" : "#1a1a1a", color: "#fff", border: "none", borderRadius: 12, fontFamily: "'DM Sans', sans-serif", fontSize: 15, fontWeight: 500, transition: "background 0.3s" }}>
                  {saved ? "✓ Gespeichert!" : "Rezept speichern"}
                </button>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>

</body>
</html>
